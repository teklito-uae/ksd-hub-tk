name: Deploy to Production Branch

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Build Backend
        run: |
          cd backend
          composer install --no-dev --optimize-autoloader

      - name: Prepare Deployment Structure
        run: |
          mkdir -p deploy
          # 1. Copy Frontend Build (includes .htaccess from public folder)
          cp -r frontend/dist/* deploy/
          
          # 2. Copy Backend
          cp -r backend deploy/

          # 3. Create Production .env inside backend folder
          cat <<EOF > deploy/backend/.env
          APP_NAME="Kasaragod Hub"
          APP_ENV=production
          APP_KEY=base64:MfbK+/xwLkQuEJLKM+oeLCBO3UK8lk0ABBVZk9WdbSU=
          APP_DEBUG=false
          APP_URL=https://kasaragodhub.com
          
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=u703200280_ksdhub_db
          DB_USERNAME=u703200280_ksdhub_db
          DB_PASSWORD="hC6A/d+MHSz#"
          
          FILESYSTEM_DISK=public
          SESSION_DRIVER=file
          CACHE_DRIVER=file
          MAIL_MAILER=smtp
          MAIL_HOST=smtp.hostinger.com
          MAIL_PORT=465
          MAIL_USERNAME="no-reply@kasaragodhub.com"
          MAIL_PASSWORD=">vX8]RH/7vF"
          MAIL_ENCRYPTION=ssl
          EOF
          
          # 4. CRITICAL: Remove .gitignore files from deploy folder 
          # so that vendor/ and .env ARE pushed to production branch
          find deploy -name ".gitignore" -type f -delete

      - name: Deploy to Production Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: production
          folder: deploy
          clean: true
          single-commit: true
