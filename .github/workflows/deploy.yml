name: Deploy to Production Branch

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Build Backend
        run: |
          cd backend
          composer install --no-dev --optimize-autoloader

      - name: Prepare Deployment Structure
        run: |
          mkdir -p deploy
          # 1. Copy Frontend Build (includes .htaccess from public folder)
          cp -r frontend/dist/* deploy/
          
          # 2. Copy Backend
          cp -r backend deploy/
          
          # 3. CRITICAL: Remove .gitignore files from deploy folder 
          # so that vendor/ and other dependencies ARE pushed to production branch
          find deploy -name ".gitignore" -type f -delete

      - name: Deploy to Production Branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: production
          folder: deploy
          clean: true
          single-commit: true
